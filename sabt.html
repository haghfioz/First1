<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[RE] AI - Create Account</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
    
    <style>
        /* ==========================================================================
           RESET & BASE STYLES (تنظیمات پایه)
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glow-effect {
            position: absolute;
            width: 320px;
            height: 320px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.12) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* ==========================================================================
           GLASS CARD DESIGN (کارت شیشه‌ای لوکس)
           ========================================================================== */
        .glass-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 28px;
            padding: 40px 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .screen-header {
            margin-bottom: 30px;
        }

        .screen-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .screen-subtitle {
            font-size: 13px;
            color: #8a8d93;
            margin-top: 8px;
            line-height: 1.4;
        }

        /* ==========================================================================
           FORM INPUTS (کادرهای ورودی)
           ========================================================================== */
        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 12px;
            color: #8a8d93;
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px;
            border-radius: 14px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            user-select: text !important;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-field:focus {
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.1);
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #d4af37 0%, #aa841b 100%);
            border: none;
            padding: 16px;
            border-radius: 14px;
            color: #000000;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.2);
            transition: transform(0.1s) ease, opacity 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: #ff4757;
            font-size: 12px;
            margin-top: 10px;
            display: none;
            font-weight: 500;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        // کانفیگ اختصاصی فایربیس شما
        const firebaseConfig = {
            apiKey: "AIzaSyDQ7-AJGgjhxFxMdgoPQKiNt0YanP0ryHo",
            authDomain: "haghfiozfirst1.firebaseapp.com",
            databaseURL: "https://haghfiozfirst1-default-rtdb.firebaseio.com",
            projectId: "haghfiozfirst1",
            storageBucket: "haghfiozfirst1.firebasestorage.app",
            messagingSenderId: "477284748293",
            appId: "1:477284748293:web:b5ecca49f844662c7fa06c"
        };

        // راه‌اندازی ابزارهای فایربیس در بک‌گراند
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // معرفی تابع اصلی به مرورگر جهت استفاده در کلیک دکمه HTML
        window.submitPhoneNumber = async function() {
            const phoneInput = document.getElementById('phone-input').value.trim();
            const btnSubmit = document.getElementById('btn-submit');
            const errBox = document.getElementById('err-box');

            if (!phoneInput) {
                errBox.innerText = "Please enter a valid phone number.";
                errBox.style.display = "block";
                return;
            }

            // قفل کردن دکمه جهت جلوگیری از کلیک مکرر روی گوشی
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = "<span>Processing... ⏳</span>";
            errBox.style.display = "none";

            // فایربیس کاراکتر "." یا علائم خاص را در کلیدها دوست ندارد؛ شماره را فیلتر یا ساده می‌کنیم
            const safePhoneKey = phoneInput.replace(/[.#$[\]]/g, "");

            try {
                // ۱. بررسی اینکه آیا این شماره از قبل ثبت‌نام قطعی کرده یا خیر
                const userRef = ref(database, 'users/' + safePhoneKey);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    const existingUser = snapshot.val();
                    if (existingUser.status === 'verified') {
                        errBox.innerText = "This phone number already exists!";
                        errBox.style.display = "block";
                        btnSubmit.disabled = false;
                        btnSubmit.innerHTML = "<span>Next Step 🚀</span>";
                        return;
                    }
                }

                // ۲. ایجاد یا رایت شماره در دیتابیس روی وضعیت پندینگ
                await set(userRef, {
                    phone: phoneInput,
                    status: 'pending',
                    coins: 0
                });

                // ذخیره موقت شماره در حافظه گوشی برای صفحات بعدی
                localStorage.setItem('user_pending_phone', phoneInput);
                
                // انتقال به صفحه تایید کد
                window.location.href = 'sabt2.html';

            } catch (error) {
                console.error(error);
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = "<span>Next Step 🚀</span>";
                errBox.innerText = "Database connection error. Try again.";
                errBox.style.display = "block";
            }
        }
    </script>
</head>
<body>

    <div class="glow-effect"></div>

    <div class="glass-card">
        <div class="screen-header">
            <h2 class="screen-title">Sign Up</h2>
            <p class="screen-subtitle">Enter your phone number to initialize authentication</p>
        </div>

        <div class="input-group">
            <label class="input-label">Phone Number</label>
            <div class="input-wrapper">
                <input type="tel" id="phone-input" class="input-field" placeholder="e.g. +989123456789" required>
            </div>
            <div id="err-box" class="error-message">Error saving database. Please try again.</div>
        </div>

        <button id="btn-submit" class="btn-primary" onclick="window.submitPhoneNumber()">
            <span>Next Step 🚀</span>
        </button>
    </div>

</body>
</html>
