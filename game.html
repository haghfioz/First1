<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[RE] AI - Game Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
    
    <style>
        /* ==========================================================================
           RESET & BASE STYLES
           ========================================================================= */
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #070a13 0%, #0f1123 50%, #1b0b24 100%);
            color: #ffffff;
            overflow: hidden;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            position: relative;
        }

        .glow-effect {
            position: absolute;
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.08) 0%, rgba(0,0,0,0) 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none;
        }

        /* ==========================================================================
           HEADER SYSTEM
           ========================================================================== */
        header {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .user-info { display: flex; flex-direction: column; gap: 4px; }

        .user-email { font-size: 13px; font-weight: 700; color: #a78bfa; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-logout {
            background: none; border: none;
            color: #ff4757; font-size: 11px; font-weight: 700;
            cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
            text-align: left;
        }

        .coin-counter-box {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .coin-amount { font-size: 20px; font-weight: 700; color: #ffe066; }

        .header-coin {
            width: 22px; height: 22px;
            background: linear-gradient(135deg, #ffe066 0%, #d4af37 50%, #aa841b 100%);
            border-radius: 50%; border: 1px solid #ffe066;
            display: flex; justify-content: center; align-items: center;
        }
        .header-square { width: 8px; height: 8px; border: 1.5px solid #000000; }

        /* ==========================================================================
           PLAYGROUND
           ========================================================================= */
        .playground {
            flex: 1; position: relative; z-index: 5;
            margin: 15px 15px 10px 15px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 24px;
            overflow: hidden;
        }

        .game-coin {
            position: absolute; width: 60px; height: 60px;
            background: linear-gradient(135deg, #ffe066 0%, #d4af37 50%, #aa841b 100%);
            border-radius: 50%; border: 3px solid #ffe066;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.25), inset 0 0 6px rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 1.2s ease-in-out; z-index: 6;
        }

        .game-coin:active { transform: scale(0.85); transition: transform 0.05s ease; }
        .game-square { width: 18px; height: 18px; border: 2px solid #000000; }

        /* ==========================================================================
           CONTROLS FOOTER
           ========================================================================== */
        .controls-footer {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px 25px 20px; background: transparent;
        }

        .btn-mining {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px;
            padding: 14px 20px; color: #94a3b8;
            font-size: 12px; font-weight: 700; cursor: pointer;
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.5px;
        }

        .btn-mining.active {
            background: rgba(168, 85, 247, 0.15); border-color: #a855f7;
            color: #c084fc; box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
        }

        .btn-chest {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px; padding: 12px 18px; font-size: 18px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-chest:active { background: rgba(255, 255, 255, 0.08); }

        /* ==========================================================================
           MODALS & ALERTS
           ========================================================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }

        .modal-overlay.show { opacity: 1; pointer-events: auto; }

        .glass-modal {
            width: 88%; max-width: 320px;
            background: rgba(20, 21, 26, 0.95); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; padding: 24px 20px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); display: flex; flex-direction: column;
        }

        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #ffffff; }
        .modal-desc { font-size: 13px; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }

        .modal-btn-group { display: flex; gap: 12px; width: 100%; }

        .btn-modal-primary {
            flex: 1; background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            border: none; padding: 14px; border-radius: 12px;
            color: #ffffff; font-size: 13px; font-weight: 700; cursor: pointer;
        }

        .btn-modal-secondary {
            flex: 1; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 14px; border-radius: 12px;
            color: #ffffff; font-size: 13px; font-weight: 600; cursor: pointer;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQ7-AJGgjhxFxMdgoPQKiNt0YanP0ryHo",
            authDomain: "haghfiozfirst1.firebaseapp.com",
            databaseURL: "https://haghfiozfirst1-default-rtdb.firebaseio.com",
            projectId: "haghfiozfirst1",
            storageBucket: "haghfiozfirst1.firebasestorage.app",
            messagingSenderId: "477284748293",
            appId: "1:477284748293:web:b5ecca49f844662c7fa06c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        let userRef = null;
        let currentCoins = 0;
        let isMiningActive = false;
        let miningInterval = null;

        // مدیریت لودینگ سشن با تکیه بر کش بومی فایربیس
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // سانسور کردن نصف جی‌میل کاربر برای امنیت بالا
                document.getElementById('display-email').innerText = maskEmail(user.email);
                userRef = ref(database, 'users/' + user.uid);
                
                initRealtimeSync();
                setTimeout(checkOfflineMining, 1500);
            } else {
                window.location.href = 'index.html';
            }
        });

        function maskEmail(email) {
            if (!email) return "Player";
            const parts = email.split('@');
            const name = parts[0];
            const mask = name.substring(0, Math.ceil(name.length / 2)) + "...";
            return mask + "@" + parts[1];
        }

        /* ==========================================================================
           قفل دکمه بازگشت سخت‌افزاری گوشی (ANTI-BACK LOCK)
           ========================================================================== */
        function preventBack() {
            window.history.pushState(null, "", window.location.href);
        }
        window.onload = preventBack;
        window.onpageshow = function(evt) { if (evt.persisted) preventBack(); }
        window.onpopstate = function() {
            preventBack();
            showAlert("Action Restrained", "You cannot go back. Please use the Logout button to exit properly.");
        };

        /* ==========================================================================
           REALTIME DB SYNC
           ========================================================================== */
        const coinsElements = document.querySelectorAll('.game-coin');

        function initRealtimeSync() {
            onValue(userRef, (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    currentCoins = data.coins || 0;
                    document.getElementById('coin-display').innerText = currentCoins.toLocaleString();
                    
                    const firebaseMining = data.mining_status === 'on';
                    if(firebaseMining !== isMiningActive) {
                        isMiningActive = firebaseMining;
                        updateMiningUI();
                    }
                }
            });
        }

        /* ==========================================================================
           FLYING COINS SYSTEM
           ========================================================================== */
        const playground = document.getElementById('game-playground');

        function moveCoins() {
            if (isMiningActive) return; 
            const pWidth = playground.clientWidth - 70;
            const pHeight = playground.clientHeight - 70;

            coinsElements.forEach(coin => {
                const randomX = Math.floor(Math.random() * pWidth);
                const randomY = Math.floor(Math.random() * pHeight);
                coin.style.left = `${randomX}px`;
                coin.style.top = `${randomY}px`;
            });
        }

        setTimeout(moveCoins, 100); 
        setInterval(moveCoins, 1600);

        window.handleCoinTap = async function(element) {
            if (isMiningActive) {
                showAlert("Mining Active ⚡", "Auto-mining is currently running. Tap collection is disabled during this process.");
                return;
            }

            element.style.transform = "scale(0.8)";
            setTimeout(() => { element.style.transform = "scale(1)"; }, 100);

            try {
                if (userRef) {
                    await update(userRef, { coins: currentCoins + 5 });
                }
            } catch (e) { console.error(e); }
        };

        /* ==========================================================================
           AUTO MINING SYSTEM (هر ۱ دقیقه ۱۵۰ سکه)
           ========================================================================== */
        window.toggleMining = async function() {
            if (!userRef) return;
            const nextState = !isMiningActive;
            const now = Date.now();

            if (nextState) {
                showAlert("Auto Mine Enabled ⚡", "Auto-mining has started! Manual coin tapping is now disabled.");
            }

            const updates = {
                mining_status: nextState ? 'on' : 'off',
                last_mining_check: now
            };

            await update(userRef, updates);
            isMiningActive = nextState;
            updateMiningUI();
        };

        function updateMiningUI() {
            const btn = document.getElementById('btn-mining-ctrl');
            if (isMiningActive) {
                btn.innerText = "Auto Mine: ON ⚡";
                btn.classList.add('active');
                coinsElements.forEach(c => c.style.display = 'none');
                startLiveMiningTimer();
            } else {
                btn.innerText = "Auto Mine: OFF 💤";
                btn.classList.remove('active');
                coinsElements.forEach(c => c.style.display = 'flex');
                if(miningInterval) clearInterval(miningInterval);
            }
        }

        function startLiveMiningTimer() {
            if(miningInterval) clearInterval(miningInterval);
            miningInterval = setInterval(async () => {
                if (!isMiningActive || !userRef) return;
                const now = Date.now();
                await update(userRef, {
                    coins: currentCoins + 150, // تخصیص ۱۵۰ سکه به ازای هر دقیقه ماین
                    last_mining_check: now
                });
            }, 60000); // بازه زمانی ۱ دقیقه
        }

        async function checkOfflineMining() {
            if (!userRef) return;
            try {
                const snapshot = await get(userRef);
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    if(data.mining_status === 'on' && data.last_mining_check) {
                        const now = Date.now();
                        const diffMs = now - data.last_mining_check;
                        const diffMinutes = Math.floor(diffMs / 60000);

                        if(diffMinutes > 0) {
                            const offlineReward = diffMinutes * 150;
                            await update(userRef, {
                                coins: data.coins + offlineReward,
                                last_mining_check: now
                            });
                            showAlert("Mining Income 💰", `While you were away, auto-mining generated ${offlineReward.toLocaleString()} coins for you!`);
                        }
                    }
                }
            } catch(e) { console.error(e); }
        }

        /* ==========================================================================
           DAILY CHEST SYSTEM (هر ۲۴ ساعت ۵۰۰0 سکه)
           ========================================================================== */
        window.claimDailyChest = async function() {
            if (!userRef) return;
            try {
                const snapshot = await get(userRef);
                if (!snapshot.exists()) return;

                const data = snapshot.val();
                const now = Date.now();
                const lastClaim = data.last_chest_claim || 0;
                const oneDayMs = 24 * 60 * 60 * 1000; 

                if (now - lastClaim >= oneDayMs) {
                    await update(userRef, {
                        coins: currentCoins + 5000,
                        last_chest_claim: now
                    });
                    showAlert("🎁 Box Claimed!", "Success! 5,000 daily reward coins have been credited to your safe.");
                } else {
                    const timeLeft = oneDayMs - (now - lastClaim);
                    const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                    const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));

                    showAlert(
                        "🔒 Locked", 
                        `Daily reward is cooling down. Please wait ${hours}h and ${minutes}m before attempting to unlock again.`
                    );
                }
            } catch (e) { console.error(e); }
        };

        /* ==========================================================================
           MODALS CONTROLLER
           ========================================================================== */
        const globalOverlay = document.getElementById('global-alert');
        window.showAlert = function(title, desc) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            globalOverlay.classList.add('show');
        };
        window.closeAlert = function() { globalOverlay.classList.remove('show'); };

        const logoutOverlay = document.getElementById('logout-alert');
        window.triggerLogoutPrompt = function() { logoutOverlay.classList.add('show'); };
        window.closeLogoutPrompt = function() { logoutOverlay.classList.remove('show'); };
        
        window.confirmLogout = async function() {
            try {
                await signOut(auth);
                window.location.href = 'index.html';
            } catch (error) { console.error(error); }
        };
    </script>
</head>
<body>

    <div class="glow-effect"></div>

    <header>
        <div class="user-info">
            <span id="display-email" class="user-email">Loading account...</span>
            <button class="btn-logout" onclick="window.triggerLogoutPrompt()">Logout 🚪</button>
        </div>
        <div class="coin-counter-box">
            <span id="coin-display" class="coin-amount">0</span>
            <div class="header-coin">
                <div class="header-square"></div>
            </div>
        </div>
    </header>

    <div id="game-playground" class="playground">
        <div class="game-coin" style="top:20%; left:15%;" onclick="window.handleCoinTap(this)">
            <div class="game-square"></div>
        </div>
        <div class="game-coin" style="top:50%; left:45%;" onclick="window.handleCoinTap(this)">
            <div class="game-square"></div>
        </div>
        <div class="game-coin" style="top:75%; left:65%;" onclick="window.handleCoinTap(this)">
            <div class="game-square"></div>
        </div>
    </div>

    <div class="controls-footer">
        <button id="btn-mining-ctrl" class="btn-mining" onclick="window.toggleMining()">
            Auto Mine: OFF 💤
        </button>
        
        <button class="btn-chest" onclick="window.claimDailyChest()">
            🎁
        </button>
    </div>

    <div id="global-alert" class="modal-overlay">
        <div class="glass-modal">
            <h3 id="alert-title" class="modal-title">Notification</h3>
            <p id="alert-desc" class="modal-desc">Message details...</p>
            <button class="btn-modal-primary" style="width:100%" onclick="window.closeAlert()">Got it</button>
        </div>
    </div>

    <div id="logout-alert" class="modal-overlay">
        <div class="glass-modal">
            <h3 class="modal-title">Account Sign Out</h3>
            <p class="mod
