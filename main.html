<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[RE] AI - Main Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
    
    <style>
        /* ==========================================================================
           RESET & BASE STYLES
           ========================================================================= */
        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .glow-effect {
            position: absolute;
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.06) 0%, rgba(0,0,0,0) 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none;
        }

        /* ==========================================================================
           HEADER SYSTEM
           ========================================================================== */
        header {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .user-info {
            display: flex; flex-direction: column; gap: 4px;
        }

        .user-phone { font-size: 14px; font-weight: 700; color: #ffffff; }

        .btn-logout {
            background: none; border: none;
            color: #ff4757; font-size: 11px; font-weight: 700;
            cursor: pointer; text-transform: uppercase; letter-spacing: 0.5px;
            text-align: left;
        }

        .coin-counter-box {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 16px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.07);
        }

        .coin-amount { font-size: 20px; font-weight: 700; color: #ffe066; }

        .header-coin {
            width: 22px; height: 22px;
            background: linear-gradient(135deg, #ffe066 0%, #d4af37 50%, #aa841b 100%);
            border-radius: 50%;
            border: 1px solid #ffe066;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.3);
        }
        .header-square { width: 8px; height: 8px; border: 1.5px solid #000000; }

        /* ==========================================================================
           PLAYGROUND
           ========================================================================== */
        .playground {
            flex: 1;
            position: relative; z-index: 5;
            margin: 15px 15px 10px 15px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            overflow: hidden;
        }

        .game-coin {
            position: absolute;
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #ffe066 0%, #d4af37 50%, #aa841b 100%);
            border-radius: 50%;
            border: 3px solid #ffe066;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.35), inset 0 0 6px rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: all 1.5s ease-in-out;
            z-index: 6;
            transform: scale(1);
        }

        .game-coin:active {
            transform: scale(0.85);
            transition: transform 0.05s ease;
        }

        .game-square {
            width: 18px; height: 18px;
            background: transparent;
            border: 2px solid #000000;
        }

        /* ==========================================================================
           CONTROLS FOOTER (اصلاح منوی پایینی برای جلوگیری از بیرون زدگی)
           ========================================================================== */
        .controls-footer {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px 25px 20px; /* پدینگ استاندارد و ایمن برای موبایل */
            background: transparent;
        }

        .btn-mining {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 18px;
            color: #8a8d93;
            font-size: 12px; font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-mining.active {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            color: #d4af37;
            box-shadow: 0 0 12px rgba(212, 175, 55, 0.15);
        }

        .btn-chest {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 18px;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: background 0.3s ease;
        }
        .btn-chest:active { background: rgba(255, 255, 255, 0.08); }

        /* ==========================================================================
           MODALS & ALERTS (اصلاح دکمه‌ها و تضمین نمایش پاپ‌آپ)
           ========================================================================== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.show { opacity: 1; pointer-events: auto; }

        .glass-modal {
            width: 88%; max-width: 320px;
            background: rgba(20, 21, 25, 0.95); /* رنگ تیره‌تر برای خوانایی دکمه‌ها */
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }

        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #ffffff; }
        .modal-desc { font-size: 13px; color: #8a8d93; line-height: 1.6; margin-bottom: 24px; }

        .modal-btn-group { 
            display: flex; 
            gap: 12px; 
            width: 100%;
            position: relative; z-index: 110;
        }

        .btn-modal-primary {
            flex: 1;
            background: linear-gradient(135deg, #d4af37 0%, #aa841b 100%);
            border: none; padding: 14px; border-radius: 12px;
            color: #000000; font-size: 13px; font-weight: 700; cursor: pointer;
        }

        .btn-modal-secondary {
            flex: 1;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12); padding: 14px; border-radius: 12px;
            color: #ffffff; font-size: 13px; font-weight: 600; cursor: pointer;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQ7-AJGgjhxFxMdgoPQKiNt0YanP0ryHo",
            authDomain: "haghfiozfirst1.firebaseapp.com",
            databaseURL: "https://haghfiozfirst1-default-rtdb.firebaseio.com",
            projectId: "haghfiozfirst1",
            storageBucket: "haghfiozfirst1.firebasestorage.app",
            messagingSenderId: "477284748293",
            appId: "1:477284748293:web:b5ecca49f844662c7fa06c"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let userPhone = localStorage.getItem('user_logged_in_phone');
        
        if (!userPhone) {
            window.location.href = 'index.html';
        }

        const safePhoneKey = userPhone.replace(/[.#$[\]]/g, "");
        const userRef = ref(database, 'users/' + safePhoneKey);

        let currentCoins = 0;
        let isMiningActive = false;
        let miningInterval = null;

        function maskPhoneNumber(phone) {
            if(phone.length > 7) {
                return phone.substring(0, 4) + "***" + phone.substring(phone.length - 4);
            }
            return phone;
        }
        document.getElementById('display-phone').innerText = maskPhoneNumber(userPhone);

        /* ==========================================================================
           ANTI-BACK LOCK
           ========================================================================== */
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.pushState(null, null, location.href);
        };

        /* ==========================================================================
           REALTIME DB SYNC
           ========================================================================== */
        onValue(userRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                currentCoins = data.coins || 0;
                document.getElementById('coin-display').innerText = currentCoins.toLocaleString();
                
                const firebaseMining = data.mining_status === 'on';
                if(firebaseMining !== isMiningActive) {
                    isMiningActive = firebaseMining;
                    updateMiningUI();
                }
            }
        });

        /* ==========================================================================
           FLYING COINS
           ========================================================================== */
        const coinsElements = document.querySelectorAll('.game-coin');
        const playground = document.getElementById('game-playground');

        function moveCoins() {
            if (isMiningActive) return; 
            
            const pWidth = playground.clientWidth - 70;
            const pHeight = playground.clientHeight - 70;

            coinsElements.forEach(coin => {
                const randomX = Math.floor(Math.random() * pWidth);
                const randomY = Math.floor(Math.random() * pHeight);
                coin.style.left = `${randomX}px`;
                coin.style.top = `${randomY}px`;
            });
        }

        setTimeout(moveCoins, 100); 
        setInterval(moveCoins, 1500);

        window.handleCoinTap = async function(element) {
            if (isMiningActive) {
                showAlert("Mining is Active!", "You cannot catch coins while auto-mining is turned on.");
                return;
            }

            element.style.transform = "scale(0.8)";
            setTimeout(() => { element.style.transform = "scale(1)"; }, 100);

            try {
                await update(userRef, { coins: currentCoins + 5 });
            } catch (e) { console.error(e); }
        };

        /* ==========================================================================
           AUTO MINING SYSTEM
           ========================================================================== */
        window.toggleMining = async function() {
            const nextState = !isMiningActive;
            const now = Date.now();

            const updates = {
                mining_status: nextState ? 'on' : 'off',
                last_mining_check: now
            };

            await update(userRef, updates);
            isMiningActive = nextState;
            updateMiningUI();
        };

        function updateMiningUI() {
            const btn = document.getElementById('btn-mining-ctrl');
            if (isMiningActive) {
                btn.innerText = "Auto Mine: ON ⚡";
                btn.classList.add('active');
                coinsElements.forEach(c => c.style.display = 'none');
                startLiveMiningTimer();
            } else {
                btn.innerText = "Auto Mine: OFF 💤";
                btn.classList.remove('active');
                coinsElements.forEach(c => c.style.display = 'flex');
                if(miningInterval) clearInterval(miningInterval);
            }
        }

        function startLiveMiningTimer() {
            if(miningInterval) clearInterval(miningInterval);
            miningInterval = setInterval(async () => {
                if (!isMiningActive) return;
                const now = Date.now();
                await update(userRef, {
                    coins: currentCoins + 500,
                    last_mining_check: now
                });
            }, 60000);
        }

        async function checkOfflineMining() {
            try {
                const snapshot = await get(userRef);
                if(snapshot.exists()) {
                    const data = snapshot.val();
                    if(data.mining_status === 'on' && data.last_mining_check) {
                        const now = Date.now();
                        const diffMs = now - data.last_mining_check;
                        const diffMinutes = Math.floor(diffMs / 60000);

                        if(diffMinutes > 0) {
                            const offlineReward = diffMinutes * 500;
                            await update(userRef, {
                                coins: data.coins + offlineReward,
                                last_mining_check: now
                            });
                            showAlert("Mining Revenue!", `While you were away, auto-mining generated ${offlineReward.toLocaleString()} coins for you!`);
                        }
                    }
                }
            } catch(e) { console.error(e); }
        }
        
        setTimeout(checkOfflineMining, 2000);

        /* ==========================================================================
           DAILY CHEST
           ========================================================================== */
        window.claimDailyChest = async function() {
            try {
                const snapshot = await get(userRef);
                if (!snapshot.exists()) return;

                const data = snapshot.val();
                const now = Date.now();
                const lastClaim = data.last_chest_claim || 0;
                const oneDayMs = 24 * 60 * 60 * 1000; 

                if (now - lastClaim >= oneDayMs) {
                    await update(userRef, {
                        coins: currentCoins + 5000,
                        last_chest_claim: now
                    });
                    showAlert("🎁 Reward Claimed!", "Success! 5,000 premium coins have been added to your balance.");
                } else {
                    const timeLeft = oneDayMs - (now - lastClaim);
                    const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                    const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

                    showAlert(
                        "Access Denied", 
                        `You have already claimed your daily reward. Please wait ${hours} hours, ${minutes} minutes, and ${seconds} seconds.`
                    );
                }
            } catch (e) { console.error(e); }
        };

        /* ==========================================================================
           MODALS CONTROLLER
           ========================================================================== */
        const globalOverlay = document.getElementById('global-alert');
        window.showAlert = function(title, desc) {
            document.getElementById('alert-title').innerText = title;
            document.getElementById('alert-desc').innerText = desc;
            globalOverlay.classList.add('show');
        };
        window.closeAlert = function() { globalOverlay.classList.remove('show'); };

        const logoutOverlay = document.getElementById('logout-alert');
        window.triggerLogoutPrompt = function() { logoutOverlay.classList.add('show'); };
        window.closeLogoutPrompt = function() { logoutOverlay.classList.remove('show'); };
        window.confirmLogout = function() {
            localStorage.removeItem('user_logged_in_phone');
            window.location.href = 'index.html';
        };
    </script>
</head>
<body>

    <div class="glow-effect"></div>

    <header>
        <div class="user-info">
            <span id="display-phone" class="user-phone">+98912***3456</span>
            <button class="btn-logout" onclick="window.triggerLogoutPrompt()">Logout 🚪</button>
        </div>
        <div class="coin-counter-box">
            <span id="coin-display" class="coin-amount">0</span>
            <div class="header-coin">
                <div class="header-square"></div>
            </div>
        </div>
    </header>

    <div id="game-playground" class="playground">
        <div class="game-coin" style="top:15%; left:20%;" onclick="window.handleCoinTap(this)">
            <div class="game-square"></div>
        </div>
        <div class="game-coin" style="top:45%; left:40%;" onclick="window.handleCoinTap(this)">
            <div class="game-square"></div>
        </div>
        <div class="game-coin" style="top:70%; left:70%;" onclick="window.handleCoinTap(this)">
            <div class="game-square"></div>
        </div>
    </div>

    <div class="controls-footer">
        <button id="btn-mining-ctrl" class="btn-mining" onclick="window.toggleMining()">
            Auto Mine: OFF 💤
        </button>
        
        <button class="btn-chest" onclick="window.claimDailyChest()">
            🎁
        </button>
    </div>

    <div id="global-alert" class="modal-overlay">
        <div class="glass-modal">
            <h3 id="alert-title" class="modal-title">Notification</h3>
            <p id="alert-desc" class="modal-desc">Message details...</p>
            <button class="btn-modal-primary" style="width:100%" onclick="window.closeAlert()">Got it</button>
        </div>
    </div>

    <div id="logout-alert" class="modal-overlay">
        <div class="glass-modal">
            <h3 class="modal-title">Account Sign Out</h3>
            <p class="modal-desc">To access your dashboard later, you will need to enter your password again. Are you sure you want to sign out?</p>
            <div class="modal-btn-group">
                <button class="btn-modal-secondary" onclick="window.closeLogoutPrompt()">Cancel</button>
                <button class="btn-modal-primary" onclick="window.confirmLogout()">Confirm</button>
            </div>
        </div>
    </div>

</body>
</html>
