<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>[RE] AI Mini-Game - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================================================
           RESET & BASE STYLES (تم یکدست و لوکس پروژه)
           ========================================================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #070a13 0%, #0f1123 50%, #1b0b24 100%);
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* افکت شیک هاله نورانی متحرك در پس‌زمینه */
        .bg-glow {
            position: absolute;
            width: 380px;
            height: 380px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 6s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -52%) scale(1.1); opacity: 1; }
        }

        /* کارت اصلی شیشه‌ای (Glassmorphism) */
        .main-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 30px;
            border-radius: 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }

        /* بخش لوگو و انیمیشن درخشش متن */
        .logo-title {
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 1.5px;
            background: linear-gradient(to right, #ffffff, #c084fc, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 4s linear infinite;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .subtitle {
            color: #64748b;
            font-size: 13px;
            margin-bottom: 45px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* باکس نگه‌دارنده دکمه‌ها */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        /* استایل پایه دکمه‌های لوکس */
        .menu-btn {
            width: 100%;
            padding: 18px 24px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        /* دکمه ساخت اکانت جدید (طلایی/بنفش درخشان) */
        .btn-new {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
            border: none;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.25);
        }

        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
            filter: brightness(1.1);
        }

        .btn-new:active { transform: translateY(1px); }

        /* دکمه ورود به اکانت قبلی (شیشه‌ای مات) */
        .btn-old {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        .btn-old:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-old:active { transform: translateY(1px); }

        /* فوتر امنیتی پایین کارت */
        .footer-tag {
            margin-top: 45px;
            font-size: 10px;
            color: #475569;
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="main-container">
        <div class="logo-title">[RE] AI GAME</div>
        <div class="subtitle">Next-Gen Crypto Gaming</div>
        
        <div class="btn-group">
            <a href="jadid.html" class="menu-btn btn-new">
                ✨ Create New Account
            </a>
            
            <a href="ghabl.html" class="menu-btn btn-old">
                🔑 Login to Existing Account
            </a>
        </div>

        <div class="footer-tag">SYSTEM CORE V2.0 // ONLINE</div>
    </div>

</body>
</html>
